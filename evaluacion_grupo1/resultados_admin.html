<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - Evaluación Grupo 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --background: #1a1b26;
            --foreground: #a9b1d6;
            --card-background: #24283b;
            --border: #414868;
            --accent: #7aa2f7;
            --accent-dark: #3d59a1;
            --green: #9ece6a;
            --yellow: #e0af68;
            --red: #f7768e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            background-image: url('https://i.pinimg.com/originals/4c/23/98/4c2398e6be397bb08b5cb70b2192d730.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--foreground);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .glass {
            background: rgba(36, 40, 59, 0.9);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 30px;
            margin-bottom: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-title p {
            opacity: 0.6;
            font-size: 14px;
        }

        .btn-icon {
            background: rgba(26, 27, 38, 0.8);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            border-color: var(--accent);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(36, 40, 59, 0.9);
            border-radius: 15px;
            border: 1px solid var(--border);
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 300;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-top: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover td {
            background: rgba(122, 162, 247, 0.05);
        }

        .grade-high { color: var(--green); }
        .grade-medium { color: var(--yellow); }
        .grade-low { color: var(--red); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            opacity: 0.3;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            opacity: 0.6;
            margin-bottom: 8px;
        }

        .empty-state p {
            opacity: 0.4;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="container">
        <div class="glass">
            <div class="header">
                <div class="header-left">
                    <i data-lucide="clipboard-list" style="width: 40px; height: 40px; color: var(--accent);"></i>
                    <div class="header-title">
                        <h1>Resultados</h1>
                        <p>Evaluación Grupo 1 - Presidentes Militares</p>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="loadResults()" class="btn-icon">
                        <i data-lucide="refresh-cw" style="width: 20px; height: 20px;"></i>
                    </button>
                    <a href="registro.html" class="btn-icon">
                        <i data-lucide="home" style="width: 20px; height: 20px;"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-estudiantes" style="color: var(--foreground)">0</div>
                <div class="stat-label">Total Estudiantes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="promedio" style="color: var(--accent)">0.0</div>
                <div class="stat-label">Promedio</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="aprobados" style="color: var(--foreground)">0</div>
                <div class="stat-label">Aprobados (≥6.0)</div>
            </div>
        </div>

        <div class="glass">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Cargando resultados...</p>
            </div>
            <div id="empty-state" class="empty-state" style="display: none;">
                <i data-lucide="users" style="width: 64px; height: 64px;"></i>
                <h3>Sin resultados aún</h3>
                <p>Los estudiantes aún no han completado la evaluación</p>
            </div>
            <table id="results-table" style="display: none;">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Estudiante</th>
                        <th style="text-align: center;">Nota</th>
                        <th style="text-align: center;">Correctas</th>
                        <th style="text-align: center;">Fecha</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: 'AIzaSyDp-D_lQHCmaZzxclHhgEPj8tfbLMPPT1Y',
            authDomain: 'status-code-418.firebaseapp.com',
            projectId: 'status-code-418',
            storageBucket: 'status-code-418.firebasestorage.app',
            messagingSenderId: '108910520136',
            appId: '1:108910520136:web:7617759f815a18d29af57d',
            measurementId: 'G-4ZPE1TCDBE'
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function getGradeColor(nota) {
            if(nota >= 8) return 'grade-high';
            if(nota >= 6) return 'grade-medium';
            return 'grade-low';
        }

        function formatDate(fechaISO) {
            if(!fechaISO) return '-';
            const fecha = new Date(fechaISO);
            return fecha.toLocaleDateString('es-SV', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        async function loadResults() {
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('empty-state');
            const table = document.getElementById('results-table');
            const tbody = document.getElementById('results-body');
            
            loading.style.display = 'block';
            emptyState.style.display = 'none';
            table.style.display = 'none';

            try {
                const q = query(collection(db, 'evaluaciones_grupo1'), orderBy('completedAt', 'desc'));
                const querySnapshot = await getDocs(q);
                
                const resultados = [];
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    if(data.estado === 'completado') {
                        resultados.push(data);
                    }
                });

                loading.style.display = 'none';

                if(resultados.length === 0) {
                    emptyState.style.display = 'block';
                    document.getElementById('total-estudiantes').textContent = '0';
                    document.getElementById('promedio').textContent = '0.0';
                    document.getElementById('aprobados').textContent = '0';
                    lucide.createIcons();
                    return;
                }

                const total = resultados.length;
                const sumaNotas = resultados.reduce((sum, r) => sum + parseFloat(r.nota), 0);
                const promedio = (sumaNotas / total).toFixed(1);
                const aprobados = resultados.filter(r => parseFloat(r.nota) >= 6).length;

                document.getElementById('total-estudiantes').textContent = total;
                document.getElementById('promedio').textContent = promedio;
                document.getElementById('aprobados').textContent = aprobados;

                tbody.innerHTML = resultados.map((r, i) => `
                    <tr>
                        <td style="opacity: 0.6; font-family: 'JetBrains Mono', monospace;">${i + 1}</td>
                        <td>${r.nombreCompleto || r.nombre}</td>
                        <td style="text-align: center;">
                            <span style="font-family: 'JetBrains Mono', monospace; font-weight: bold; font-size: 18px;" class="${getGradeColor(r.nota)}">${r.nota}</span>
                            <span style="opacity: 0.4">/10</span>
                        </td>
                        <td style="text-align: center; opacity: 0.6; font-family: 'JetBrains Mono', monospace;">
                            ${r.respuestasCorrectas || 0}/${r.totalPreguntas || 10}
                        </td>
                        <td style="text-align: center; opacity: 0.6;">${formatDate(r.completedAt)}</td>
                    </tr>
                `).join('');

                table.style.display = 'table';
                lucide.createIcons();

            } catch (error) {
                console.error('Error:', error);
                loading.innerHTML = `
                    <p style="color: var(--red)">Error al cargar los resultados</p>
                    <p style="opacity: 0.6; font-size: 12px; margin-top: 8px">${error.message}</p>
                `;
            }
        }

        // Solo bloquear F12 y teclado
        window.addEventListener('keydown', (e) => {
            if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "C" || e.key === "J")) || (e.ctrlKey && e.key === "u")) {
                e.preventDefault();
            }
        });

        window.onload = loadResults;
    </script>
</body>
</html>
