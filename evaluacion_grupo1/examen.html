<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Grupo 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --background: #1a1b26;
            --foreground: #a9b1d6;
            --card-background: #24283b;
            --border: #414868;
            --accent: #7aa2f7;
            --accent-dark: #3d59a1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            background-image: url('https://i.pinimg.com/originals/4c/23/98/4c2398e6be397bb08b5cb70b2192d730.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--foreground);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .glass {
            background: rgba(36, 40, 59, 0.9);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 40px;
            text-align: center;
        }

        .btn {
            background: var(--accent);
            color: var(--background);
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: inline-block;
        }

        .btn:hover {
            background: var(--accent-dark);
        }

        .question-card {
            background: rgba(36, 40, 59, 0.9);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .question-header {
            background: rgba(26, 27, 38, 0.9);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .question-body {
            padding: 40px;
        }

        .option {
            background: rgba(26, 27, 38, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option:hover {
            border-color: var(--accent);
            background: rgba(122, 162, 247, 0.1);
            transform: translateY(-2px);
        }

        .option-letter {
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="container">
        <div id="main-view">
            <!-- Contenido -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: 'AIzaSyDp-D_lQHCmaZzxclHhgEPj8tfbLMPPT1Y',
            authDomain: 'status-code-418.firebaseapp.com',
            projectId: 'status-code-418',
            storageBucket: 'status-code-418.firebasestorage.app',
            messagingSenderId: '108910520136',
            appId: '1:108910520136:web:7617759f815a18d29af57d',
            measurementId: 'G-4ZPE1TCDBE'
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const preguntas = [
            { t: "¿Qué partido político fue el brazo de la Fuerza Armada entre 1960 y 1970?", o: ["PDC", "PCN", "ARENA", "FMLN"], c: 1 },
            { t: "¿Cómo se le conocía a El Salvador debido a su dependencia del café?", o: ["República Bananera", "Valle de Oro", "República Cafetalera", "Costa del Sol"], c: 2 },
            { t: "¿A qué valor se mantuvo fijado el Colón respecto al dólar estadounidense?", o: ["8.75 por $1", "5.00 por $1", "2.50 por $1", "1.00 por $1"], c: 2 },
            { t: "¿Qué conflicto rompió el Mercado Común Centroamericano en 1969?", o: ["Guerra Civil", "Guerra con Honduras", "Guerra de las 100 Horas", "Golpe de Estado"], c: 1 },
            { t: "¿Cuál fue el segundo producto de exportación más importante en los años 60?", o: ["Azúcar", "Maíz", "Ajonjolí", "Algodón"], c: 3 },
            { t: "¿Qué fenómeno económico ocurrió a finales de los 70 por temor a una revolución?", o: ["Reforma Agraria", "Fuga de Capitales", "Nacionalización", "Inversión Extranjera"], c: 1 },
            { t: "¿Qué factor atrajo empresas estadounidenses mediante leyes de fomento?", o: ["Baja Deuda", "Inversión Extranjera Directa", "Exportación", "Manejo de Divisas"], c: 1 },
            { t: "Durante este periodo, El Salvador tenía una balanza positiva con:", o: ["Estados Unidos", "Europa", "Centroamérica", "Asia"], c: 2 },
            { t: "¿Qué sector era la base de la economía salvadoreña (1960-1979)?", o: ["Primario", "Secundario", "Terciario", "Servicios"], c: 0 },
            { t: "¿Cómo se llamó al sistema de los gobiernos militares en este periodo?", o: ["Democracia Directa", "Dictadura Totalitaria", "Autoritarismo Modernizador", "Socialismo"], c: 2 }
        ];

        let index = 0;
        let score = 0;
        const container = document.getElementById('main-view');
        
        let nombreCompleto = '';
        let nombreKey = '';

        async function init() {
            nombreCompleto = localStorage.getItem('g1_nombre');
            nombreKey = localStorage.getItem('g1_nombre_normalizado');
            
            if (!nombreCompleto || !nombreKey) {
                window.location.href = 'registro.html';
                return;
            }

            try {
                const docRef = doc(db, 'evaluaciones_grupo1', nombreKey);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists() && docSnap.data().estado === 'completado') {
                    showBlock(docSnap.data().nota);
                    return;
                }
                
                if(localStorage.getItem('g1_done')) {
                    showBlock(localStorage.getItem('g1_score'));
                    return;
                }
                
                showHome();
            } catch (error) {
                console.error('Error:', error);
                showHome();
            }
        }

        function showHome() {
            container.innerHTML = `
                <div class="glass">
                    <i data-lucide="shield" style="width: 64px; height: 64px; color: var(--accent); margin-bottom: 24px;"></i>
                    <h1 style="font-size: 28px; font-weight: 600; margin-bottom: 8px;">Presidentes Militares (60-70)</h1>
                    <p style="opacity: 0.6; margin-bottom: 16px; text-transform: uppercase; font-size: 12px; letter-spacing: 2px;">Evaluación · Grupo 1</p>
                    <p style="margin-bottom: 32px;">Estudiante: <span style="color: var(--accent)">${nombreCompleto}</span></p>
                    <button id="start-btn" class="btn">Iniciar Examen</button>
                </div>
            `;
            lucide.createIcons();
            document.getElementById('start-btn').addEventListener('click', start);
        }

        function start() {
            index = 0;
            score = 0;
            renderQuestion();
        }

        function renderQuestion() {
            if(index >= preguntas.length) {
                finish();
                return;
            }

            const q = preguntas[index];
            container.innerHTML = `
                <div class="question-card">
                    <div class="question-header">
                        <span style="opacity: 0.6; font-size: 14px;">Pregunta ${index + 1} de ${preguntas.length}</span>
                    </div>
                    <div class="question-body">
                        <h2 style="font-size: 20px; font-weight: 400; margin-bottom: 30px;">${q.t}</h2>
                        <div>
                            ${q.o.map((opt, i) => `
                                <div class="option" onclick="handleSelect(${i})">
                                    <span class="option-letter">${String.fromCharCode(65+i)}</span>
                                    <span>${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        window.handleSelect = function(i) {
            if(i === preguntas[index].c) score++;
            index++;
            renderQuestion();
        };

        async function finish() {
            const final = (score / preguntas.length * 10).toFixed(1);
            
            localStorage.setItem('g1_done', 'true');
            localStorage.setItem('g1_score', final);
            
            try {
                const docRef = doc(db, 'evaluaciones_grupo1', nombreKey);
                await updateDoc(docRef, {
                    estado: 'completado',
                    nota: final,
                    respuestasCorrectas: score,
                    totalPreguntas: preguntas.length,
                    completedAt: new Date().toISOString()
                });
            } catch (error) {
                console.error('Error:', error);
            }
            
            container.innerHTML = `
                <div class="glass">
                    <i data-lucide="check-circle" style="width: 64px; height: 64px; color: var(--accent); margin-bottom: 24px;"></i>
                    <h2 style="font-size: 20px; opacity: 0.6; margin-bottom: 8px;">Evaluación Finalizada</h2>
                    <div style="font-size: 56px; font-weight: 300; margin: 24px 0;">${final}</div>
                    <p style="opacity: 0.4; font-size: 12px; text-transform: uppercase; letter-spacing: 2px;">Puntaje registrado</p>
                </div>
            `;
            lucide.createIcons();
        }

        function showBlock(nota) {
            container.innerHTML = `
                <div class="glass">
                    <i data-lucide="lock" style="width: 64px; height: 64px; opacity: 0.3; margin-bottom: 24px;"></i>
                    <h2 style="font-size: 20px; opacity: 0.6; margin-bottom: 16px;">Evaluación Ya Completada</h2>
                    <div style="background: rgba(26,27,38,0.8); padding: 12px 24px; border-radius: 50px; border: 1px solid var(--border); display: inline-block; font-family: 'JetBrains Mono', monospace;">
                        Nota: ${nota} / 10.0
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // Solo bloquear F12 y teclado
        window.addEventListener('keydown', (e) => {
            if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "C" || e.key === "J")) || (e.ctrlKey && e.key === "u")) {
                e.preventDefault();
            }
        });

        window.onload = init;
    </script>
</body>
</html>
