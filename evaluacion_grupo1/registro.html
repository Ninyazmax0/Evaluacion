<script>
  document.addEventListener('keydown', function(event) {
    // Allow normal input in text fields
    const inputFields = ['TEXTAREA', 'INPUT'];
    if (inputFields.includes(event.target.tagName)) {
      return;
    }

    // Block specific keys to prevent access to developer tools
    const blockedKeys = ['F12', 'I', 'J', 'C', 'U', 'S', 'P']; // Alt + Actions
    if (blockedKeys.includes(event.key) && (event.ctrlKey || event.shiftKey)) {
        event.preventDefault();
    }
  });
</script>
